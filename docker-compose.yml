services:
  db:
    image: postgres:16-alpine
    container_name: evebloom-db
    environment:
      POSTGRES_DB: reproductive_health
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reproductive_health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: evebloom-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/reproductive_health
      CORS_ORIGINS: http://localhost:5173,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: evebloom-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
